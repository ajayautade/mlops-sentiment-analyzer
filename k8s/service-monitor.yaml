# ==============================================================================
# ServiceMonitor — Prometheus Scraping Configuration
# ==============================================================================
#
# PURPOSE:
#   This tells Prometheus HOW and WHERE to collect metrics from our AI app.
#   Without this, Prometheus doesn't know our app exists and won't scrape
#   the /metrics endpoint.
#
# HOW IT WORKS:
#   1. Prometheus (installed via kube-prometheus-stack Helm chart) watches
#      for ServiceMonitor resources in the cluster
#   2. This ServiceMonitor tells Prometheus:
#      "Find all Services with label app: sentiment-analyzer,
#       and scrape their /metrics endpoint every 15 seconds"
#   3. Prometheus collects our custom AI metrics:
#      - prediction_requests_total
#      - prediction_latency_seconds
#      - prediction_confidence_score
#      - model_ready
#      - etc.
#   4. Grafana then visualizes these metrics in dashboards
#
# IMPORTANT:
#   The label "release: monitoring" MUST match the Helm release name
#   of your kube-prometheus-stack installation. Check terraform/monitoring.tf
#   where we set: name = "monitoring"
#
# ==============================================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sentiment-analyzer-monitor
  namespace: mlops
  labels:
    app: sentiment-analyzer
    # This label MUST match the Prometheus Helm release name
    # Without this, Prometheus won't pick up this ServiceMonitor
    release: monitoring
spec:
  # Find Services with this label — matches our service.yaml
  selector:
    matchLabels:
      app: sentiment-analyzer

  # Define what to scrape
  endpoints:
    - port: http               # Must match the port name in service.yaml (name: http)
      path: /metrics           # The endpoint our FastAPI app exposes Prometheus metrics on
      interval: 15s            # Scrape every 15 seconds (good balance of freshness vs load)
      scrapeTimeout: 10s       # Give up if /metrics doesn't respond within 10 seconds

  # Only look for Services in the mlops namespace
  namespaceSelector:
    matchNames:
      - mlops
