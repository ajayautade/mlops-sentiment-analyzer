# ==============================================================================
# ConfigMap — MLOps Sentiment Analyzer
# ==============================================================================
#
# PURPOSE:
#   A ConfigMap stores non-sensitive configuration data as key-value pairs.
#   These values are injected into the container as environment variables.
#
# WHY USE A CONFIGMAP?
#   Instead of hardcoding values in the Dockerfile or application code,
#   we externalize them here. This means you can change the model name,
#   log level, or app version WITHOUT rebuilding the Docker image.
#   Just update this file, push to Git → ArgoCD redeploys automatically.
#
# HOW IT CONNECTS:
#   The Deployment (deployment.yaml) references this ConfigMap via:
#     envFrom:
#       - configMapRef:
#           name: sentiment-analyzer-config
#   This makes ALL keys below available as environment variables in the pod.
#
# ==============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: sentiment-analyzer-config
  namespace: mlops
  labels:
    app: sentiment-analyzer
data:
  # Application version — displayed in /health and / endpoints
  APP_VERSION: "1.0.0"

  # Environment name — helps distinguish dev/staging/prod in logs
  APP_ENV: "production"

  # Port the FastAPI app listens on (must match Deployment containerPort)
  PORT: "8080"

  # HuggingFace model identifier — change this to serve a different model
  # without modifying any application code or Docker image
  MODEL_NAME: "distilbert/distilbert-base-uncased-finetuned-sst-2-english"

  # Logging level — set to DEBUG for troubleshooting, INFO for production
  LOG_LEVEL: "INFO"

  # Disable Python output buffering — ensures logs appear immediately
  # in kubectl logs (important for debugging in Kubernetes)
  PYTHONUNBUFFERED: "1"
